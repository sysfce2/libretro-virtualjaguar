name: C/C++ CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          # Linux
          - displayTargetName: 'Linux x86_64 (GCC)'
            artifact: 'virtualjaguar_libretro.so'
            os: ubuntu-latest
            cc: 'gcc'
            cxx: 'g++'

          - displayTargetName: 'Linux x86_64 (Clang)'
            artifact: 'virtualjaguar_libretro.so'
            os: ubuntu-latest
            cc: 'clang'
            cxx: 'clang++'

          - displayTargetName: 'Linux aarch64'
            artifact: 'virtualjaguar_libretro.so'
            os: ubuntu-24.04-arm
            cc: 'gcc'
            cxx: 'g++'

          # macOS
          - displayTargetName: 'macOS arm64 (Clang)'
            artifact: 'virtualjaguar_libretro.dylib'
            os: macos-latest
            cc: 'clang'
            cxx: 'clang++'

          # Windows
          - displayTargetName: 'Windows x86_64 (MSYS2)'
            artifact: 'virtualjaguar_libretro.dll'
            os: windows-latest
            cc: 'gcc'
            cxx: 'g++'
            shell: 'msys2 {0}'

    name: build-${{ matrix.config.displayTargetName }}
    runs-on: ${{ matrix.config.os }}

    defaults:
      run:
        shell: ${{ matrix.config.shell || 'bash' }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up MSYS2
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: false
        install: >-
          mingw-w64-x86_64-gcc
          make

    - name: Build
      run: make -j4 CC=${{ matrix.config.cc }} CXX=${{ matrix.config.cxx }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.config.displayTargetName }}
        path: ${{ matrix.config.artifact }}
        if-no-files-found: error

  post-artifacts:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Comment artifact links on PR
      continue-on-error: true
      uses: actions/github-script@v7
      with:
        script: |
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

          // Fetch actual artifact list from this workflow run
          const { data: { artifacts } } = await github.rest.actions.listWorkflowRunArtifacts({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: context.runId,
          });

          let rows = '';
          for (const a of artifacts) {
            const dlUrl = `${runUrl}/artifacts/${a.id}`;
            rows += `| ${a.name} | [${a.name}](${dlUrl}) | ${(a.size_in_bytes / 1024).toFixed(0)} KB |\n`;
          }

          if (!rows) {
            rows = `| - | No artifacts found | - |\n`;
          }

          const comments = await github.paginate(
            github.rest.issues.listComments,
            {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            }
          );
          const marker = '<!-- build-artifacts -->';
          const existing = comments.find(c => c.body.includes(marker));

          const body = [
            marker,
            '### Build Artifacts',
            '',
            '| Platform | Download | Size |',
            '|----------|----------|------|',
            rows.trim(),
            '',
            `> [Full workflow run](${runUrl})`,
            '',
            `<sub>Updated by CI at ${new Date().toISOString()}</sub>`,
          ].join('\n');

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
