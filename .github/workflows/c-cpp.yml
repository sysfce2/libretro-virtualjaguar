name: C/C++ CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          # Linux
          - displayTargetName: 'Linux x86_64 (GCC)'
            artifact: 'virtualjaguar_libretro.so'
            os: ubuntu-latest
            cc: 'gcc'
            cxx: 'g++'

          - displayTargetName: 'Linux x86_64 (Clang)'
            artifact: 'virtualjaguar_libretro.so'
            os: ubuntu-latest
            cc: 'clang'
            cxx: 'clang++'

          - displayTargetName: 'Linux aarch64'
            artifact: 'virtualjaguar_libretro.so'
            os: ubuntu-24.04-arm
            cc: 'gcc'
            cxx: 'g++'

          # macOS
          - displayTargetName: 'macOS arm64 (Clang)'
            artifact: 'virtualjaguar_libretro.dylib'
            os: macos-latest
            cc: 'clang'
            cxx: 'clang++'

          # Windows
          - displayTargetName: 'Windows x86_64 (MSYS2)'
            artifact: 'virtualjaguar_libretro.dll'
            os: windows-latest
            shell: 'msys2 {0}'

    name: build-${{ matrix.config.displayTargetName }}
    runs-on: ${{ matrix.config.os }}

    defaults:
      run:
        shell: ${{ matrix.config.shell || 'bash' }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up MSYS2
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: false
        install: >-
          mingw-w64-x86_64-gcc
          make

    - name: Build
      run: make -j4
      env:
        CC: ${{ matrix.config.cc || '' }}
        CXX: ${{ matrix.config.cxx || '' }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.config.displayTargetName }}
        path: ${{ matrix.config.artifact }}
        if-no-files-found: error
